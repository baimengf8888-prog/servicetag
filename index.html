    go("inventory");
  }

  /* ---------------- catch-up import (bootstrap existing inventory) ---------------- */
  let pendingCatchup=null;

  function detectCatchupColumns(headers){
    return {
      sn:   guessCol(headers,[/^s\/?n\.?$/i,/serial/i,/\bsn\b/i]),
      sku:  guessCol(headers,[/part\s*(no|number|#)?/i,/\bpn\b/i,/sku/i,/model/i]),
      desc: guessCol(headers,[/desc/i,/item\s*name/i,/product/i]),
      grade:guessCol(headers,[/grade/i,/condition/i]),
      disp: guessCol(headers,[/status/i,/disposition/i,/state/i]),
      loc:  guessCol(headers,[/location/i,/\bbin\b/i,/shelf/i,/warehouse/i,/site/i]),
      note: guessCol(headers,[/note/i,/comment/i,/remark/i]),
    };
  }
  function readCatchupMap(){
    const g=id=>{const el=document.getElementById(id);return el?el.value:"";};
    return {sn:g("cu-map-sn"),sku:g("cu-map-sku"),desc:g("cu-map-desc"),grade:g("cu-map-grade"),
      disp:g("cu-map-disp"),loc:g("cu-map-loc"),note:g("cu-map-note")};
  }
  function renderCatchupMapping(headers,map){
    const box=document.getElementById("cu-mapping"); if(!box)return;
    const opts=(sel,allowNone)=>((allowNone?`<option value="">— none —</option>`:"")+
      headers.map(h=>`<option value="${esc(h)}" ${h===sel?"selected":""}>${esc(h)}</option>`).join(""));
    box.innerHTML=`
      <div class="two">
        <label class="field"><span>Serial number column <span style="color:var(--g-d);">*</span></span>
          <select id="cu-map-sn">${map.sn?"":`<option value="" selected>— choose —</option>`}${opts(map.sn,false)}</select></label>
        <label class="field"><span>Part / SKU column</span><select id="cu-map-sku">${opts(map.sku,true)}</select></label>
      </div>
      <div class="two">
        <label class="field"><span>Description column</span><select id="cu-map-desc">${opts(map.desc,true)}</select></label>
        <label class="field"><span>Location column</span><select id="cu-map-loc">${opts(map.loc,true)}</select></label>
      </div>
      <div class="two">
        <label class="field"><span>Grade column <span class="muted">(A/B/C/D/scrap)</span></span><select id="cu-map-grade">${opts(map.grade,true)}</select></label>
        <label class="field"><span>Status column</span><select id="cu-map-disp">${opts(map.disp,true)}</select></label>
      </div>
      <label class="field"><span>Notes column</span><select id="cu-map-note">${opts(map.note,true)}</select></label>`;
  }
  // Lenient text -> our fixed vocab. Unrecognized text is preserved in the note, not lost.
  function normGrade(v){
    v=String(v||"").trim().toUpperCase();
    if(["A","B","C","D"].includes(v)) return v;
    if(/^SCRAP|DEAD|FAIL/.test(v)) return "scrap";
    if(/LIKE\s*NEW|SEALED|GRADE\s*A/.test(v)) return "A";
    return "";
  }
  function normDisp(v){
    v=String(v||"").trim().toLowerCase();
    if(!v) return "";
    if(/refurb/.test(v)) return "refurb";
    if(/scrap|dead|dispos/.test(v)) return "scrap";
    if(/inspect|review|pending|hold|quarantine/.test(v)) return "needs-inspection";
    if(/stock|ready|available|good|in\s*inv/.test(v)) return "stock";
    if(/\bshipped\b/.test(v)) return "shipped";
    return "";
  }

  function buildCatchupPlan(rows,map){
    const plan={items:[],skipped:0,noSn:0,dups:0,newLocs:new Set()};
    if(!map.sn) return plan;
    const seen=new Set();
    const existing=new Set(state.units.map(u=>u.sn.toLowerCase()));
    rows.forEach(row=>{
      const sns=splitSns(rmaCol(row,map.sn));
      if(!sns.length){ plan.noSn++; return; }
      const sku=map.sku?rmaCol(row,map.sku):"";
      const desc=map.desc?rmaCol(row,map.desc):"";
      const rawGrade=map.grade?rmaCol(row,map.grade):"";
      const rawDisp=map.disp?rmaCol(row,map.disp):"";
      const rawNote=map.note?rmaCol(row,map.note):"";
      const locName=map.loc?rmaCol(row,map.loc):"";
      const grade=normGrade(rawGrade);
      const disposition=normDisp(rawDisp)||"stock";
      const extra=[!grade&&rawGrade?`Grade (sheet): ${rawGrade}`:"",!normDisp(rawDisp)&&rawDisp?`Status (sheet): ${rawDisp}`:"",rawNote].filter(Boolean).join(" · ");
      sns.forEach(sn=>{
        const key=sn.toLowerCase();
        if(seen.has(key)){ plan.dups++; return; }
        seen.add(key);
        if(existing.has(key)){ plan.skipped++; return; }
        if(locName) plan.newLocs.add(locName);
        plan.items.push({sn,sku,desc,grade,disposition,locName,note:extra||"Initial inventory import"});
      });
    });
    return plan;
  }

  function renderCatchupPreview(plan,fileName){
    const box=document.getElementById("cu-preview"); if(!box)return;
    const btn=document.getElementById("cu-go");
    if(!plan.items.length){
      box.innerHTML=`<div class="pick-empty" style="margin-bottom:12px;">Nothing new to import from “${esc(fileName)}” with that mapping — check the serial column, or every serial may already be in inventory.</div>`;
      btn.style.display="none"; return;
    }
    const sample=plan.items.slice(0,8).map(it=>`
      <div class="pick"><div style="min-width:0;"><span class="sn">${esc(it.sn)}</span>
        <span class="muted" style="font-size:12.5px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(it.desc||it.sku||"")}${it.locName?" · "+esc(it.locName):""}</span></div>
        ${gradeChip(it.grade||"none")}<span class="pill disp-${it.disposition}" style="flex:none;">${esc(dispLabel[it.disposition])}</span></div>`).join("");
    const locNote=plan.newLocs.size?`<div class="muted" style="font-size:12.5px;margin:8px 0;">Will create ${plan.newLocs.size} new location${plan.newLocs.size>1?"s":""}: ${esc([...plan.newLocs].join(", "))}</div>`:"";
    box.innerHTML=`
      <div class="muted" style="font-size:13px;margin:4px 0 10px;">
        <strong>${plan.items.length}</strong> new unit${plan.items.length===1?"":"s"} will be added.
        ${plan.skipped?` ${plan.skipped} already in inventory — left untouched.`:""}
        ${plan.dups?` ${plan.dups} duplicate${plan.dups>1?"s":""} in file skipped.`:""}
        ${plan.noSn?` ${plan.noSn} row${plan.noSn>1?"s":""} without a serial ignored.`:""}
      </div>${locNote}${sample}${plan.items.length>8?`<div class="muted" style="font-size:12px;margin-top:6px;">…and ${plan.items.length-8} more</div>`:""}`;
    btn.style.display="flex"; btn.textContent=`Import ${plan.items.length} unit${plan.items.length===1?"":"s"}`;
  }

  async function parseCatchupFile(file){
    const box=document.getElementById("cu-preview");
    box.innerHTML=`<div class="muted" style="font-size:13px;padding:6px 0;">Reading “${esc(file.name)}”…</div>`;
    try{
      const rows=await readTabularFile(file);
      const headers=rows.length?Object.keys(rows[0]):[];
      if(!headers.length) throw new Error("No data rows found.");
      const map=detectCatchupColumns(headers);
      pendingCatchup={rows,headers,fileName:file.name};
      renderCatchupMapping(headers,map);
      renderCatchupPreview(buildCatchupPlan(rows,map),file.name);
    }catch(err){
      console.error(err);
      pendingCatchup=null;
      document.getElementById("cu-mapping").innerHTML="";
      box.innerHTML=`<div class="pick-empty" style="margin-bottom:12px;">Couldn't read that file. ${esc(err.message||"")}</div>`;
      document.getElementById("cu-go").style.display="none";
    }
  }
  function replanCatchup(){
    if(!pendingCatchup)return;
    renderCatchupPreview(buildCatchupPlan(pendingCatchup.rows,readCatchupMap()),pendingCatchup.fileName);
  }

  async function ensureLocation(name){
    let l=state.locations.find(x=>x.name.toLowerCase()===name.toLowerCase());
    if(l) return l.id;
    if(cloudMode){
      const created=await cloudAddLocation(name);
      state.locations.push(created);
      return created.id;
    }
    const created={id:uid(),name};
    state.locations.push(created); persist();
    return created.id;
  }

  async function doCatchupImport(){
    if(!pendingCatchup){ toast("Load an inventory file first"); return; }
    const plan=buildCatchupPlan(pendingCatchup.rows,readCatchupMap());
    if(!plan.items.length){ toast("Nothing new to import"); return; }
    const btn=document.getElementById("cu-go");
    btn.disabled=true; btn.textContent="Importing…";
    const locCache={};
    let added=0, failed=0;
    for(const it of plan.items){
      try{
        let locId="";
        if(it.locName){
          if(!(it.locName in locCache)) locCache[it.locName]=await ensureLocation(it.locName);
          locId=locCache[it.locName];
        }
        const common={sku:it.sku,desc:it.desc,location:locId,ref:""};
        let unit;
        if(cloudMode){
          const created=await cloudReceiveUnits([it.sn],common);
          unit=created[0]; state.units.push(unit);
        }else{
          unit=receiveUnits([it.sn],common)[0];
        }
        // Overwrite the generic "Received" note/grade/status with the sheet's own state.
        if(it.grade||it.disposition!=="needs-inspection"||it.note!=="Initial inventory import"){
          addEvent(unit.id,{note:it.note,grade:it.grade||undefined,disposition:it.disposition});
        }
        added++;
      }catch(err){ console.error(err); failed++; }
    }
    pendingCatchup=null;
    btn.disabled=false;
    toast(`Imported ${added} unit${added===1?"":"s"}${failed?`, ${failed} failed`:""}`);
    document.getElementById("cu-mapping").innerHTML="";
    document.getElementById("cu-preview").innerHTML="";
    btn.style.display="none";
    state.filter={q:"",grade:"",disp:""};
    go("inventory");
  }

  /* test hook for headless verification (harmless in production) */
  window.STDebug={buildRmaPlan,processRmaPlan,parseCsv,buildShipPlan,detectShipColumns,
    buildCatchupPlan,detectCatchupColumns,normGrade,normDisp};

  function exportData(){
    const payload={app:"servicetag",version:1,exportedAt:new Date().toISOString(),locations:state.locations,units:state.units};
    const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url; a.download="servicetag-backup-"+new Date().toISOString().slice(0,10)+".json";
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1500);
    toast("Backup downloaded · "+state.units.length+" units");
  }
  function importData(file){
    const reader=new FileReader();
    reader.onload=async()=>{
      try{
        const d=JSON.parse(reader.result);
        if(!d||!Array.isArray(d.units)||!Array.isArray(d.locations)) throw new Error("shape");
        if(cloudMode){
          if(!window.confirm("Add the "+d.units.length+" units in this backup to your account?")) return;
          try{
            await cloudBulkUpload(d.locations,d.units);
            await cloudLoadAll();
            toast("Backup added to your account · "+d.units.length+" units"); go("dashboard");
          }catch(err){ syncFail(err); }
          return;
        }
        if(state.units.length && !window.confirm("Replace everything currently in the app with this backup? Download a backup first if you're unsure.")) return;
        state.locations=d.locations; state.units=d.units; state.unitId=null; state.pick=[];
        persist(); toast("Backup restored · "+d.units.length+" units"); go("dashboard");
      }catch(err){ toast("Couldn't read that file — is it a ServiceTag backup?"); }
    };
    reader.onerror=()=>toast("Couldn't open that file");
    reader.readAsText(file);
  }

  /* ---------------- boot ---------------- */
  function renderAccount(){
    const foot=document.getElementById("account-foot"); if(!foot)return;
    const s=state.session||{};
    const who=s.provider==="Local"?"Local · this device only"
      :(s.email?esc(s.email):(s.provider?s.provider+" account":"—"));
    const sub=cloudMode?'<div style="font-size:10.5px;color:#8E8B82;margin-bottom:9px;">synced to your account</div>':"";
    foot.innerHTML=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:${cloudMode?"3":"9"}px;color:#CFCCC3;word-break:break-all;"><span style="width:8px;height:8px;border-radius:50%;background:#7CD389;flex:none;"></span>${who}</div>${sub}
      <button class="btn ghost sm" data-act="signout" style="color:#CFCCC3;border:1px solid rgba(255,255,255,.16);">Sign out</button>`;
  }
  function showLogin(){
    document.getElementById("login").classList.add("show");
    document.querySelector(".app").style.display="none";
  }
  function enterApp(){
    document.getElementById("login").classList.remove("show");
    document.querySelector(".app").style.display="grid";
    renderAccount(); go("dashboard");
  }
  function signIn(provider){
    if(provider==="Local"){
      state.session={provider,since:now()}; persist(); enterApp();
      toast("Working on this device"); return;
    }
    if(BACKEND){
      // Real OAuth: navigates away to Google/Apple and returns with a session.
      sb.auth.signInWithOAuth({
        provider:provider.toLowerCase(),
        options:{redirectTo:window.location.origin+window.location.pathname}
      }).then(({error})=>{ if(error) toast("Sign-in failed: "+error.message); });
      return;
    }
    state.session={provider,since:now()}; persist(); enterApp();
    toast("Signed in with "+provider+" · simulated");
  }
  async function signOut(){
    if(cloudMode){
      try{ await sb.auth.signOut(); }catch(e){}
      cloudMode=false; state.units=[]; state.locations=[];
      const local=await Store.load();   // put any device-only data back in view for guest mode
      if(local){ state.units=local.units||[]; state.locations=local.locations||[]; }
    }
    state.session=null; persist(); showLogin();
  }

  async function cloudEnter(session){
    cloudMode=true;
    const user=session.user||{};
    const prov=(user.app_metadata&&user.app_metadata.provider)||"account";
    state.session={provider:prov.charAt(0).toUpperCase()+prov.slice(1),email:user.email||"",real:true,since:now()};
    try{ await cloudLoadAll(); }
    catch(err){ console.error(err); toast("⚠ Couldn't load your data — check connection"); }
    enterApp();
    // One-time offer: move device-only data into the account.
    try{
      const flag="servicetag:migrated:"+user.id;
      if(!localStorage.getItem(flag)){
        const local=JSON.parse(localStorage.getItem(KEY)||"null");
        if(local&&local.units&&local.units.length){
          const n=local.units.length;
          if(window.confirm(`Move the ${n} unit${n>1?"s":""} saved on this device into your account?`)){
            await cloudBulkUpload(local.locations||[],local.units);
            await cloudLoadAll(); go("dashboard");
            toast(`Moved ${n} unit${n>1?"s":""} into your account`);
          }
          localStorage.setItem(flag,"1");   // asked once, either way
        } else localStorage.setItem(flag,"1");
      }
    }catch(e){ console.error(e); }
  }

  /* ---------------- theme ---------------- */
  function toggleTheme(){
    const root=document.documentElement;
    const dark=root.getAttribute("data-theme")==="dark";
    const next=dark?"light":"dark";
    root.setAttribute("data-theme",next);
    try{ localStorage.setItem("servicetag:theme",next); }catch(e){}
    const meta=document.querySelector('meta[name="theme-color"]');
    if(meta) meta.setAttribute("content", next==="dark"?"#17181B":"#2C2F36");
  }

  (async function init(){
    document.querySelectorAll("#theme-toggle,#theme-toggle-login").forEach(b=>b.addEventListener("click",toggleTheme));
    const fine=document.getElementById("login-fine");
    if(fine&&BACKEND) fine.innerHTML="Google and Apple sign-in are live — your data syncs to your account.<br>Without an account, your data stays only on this device.";

    const loaded=await Store.load();
    if(loaded){ state=Object.assign(state,loaded); state.view="dashboard"; state.unitId=null; state.pick=[]; }
    // Never trust a persisted non-guest session; real sessions come from Supabase below.
    if(state.session&&state.session.provider!=="Local") state.session=null;

    if(BACKEND){
      const {data}=await sb.auth.getSession();
      if(data&&data.session){ await cloudEnter(data.session); }
      else if(state.session){ enterApp(); }
      else { showLogin(); }
      sb.auth.onAuthStateChange((event,session)=>{
        if(event==="SIGNED_IN"&&session&&!cloudMode){ cloudEnter(session); }
        if(event==="SIGNED_OUT"&&cloudMode){ cloudMode=false; state.session=null; showLogin(); }
      });
      return;
    }
    if(state.session) enterApp(); else showLogin();
  })();
})();
</script>
<script>
  /* Offline cache: keeps the app openable on the floor with no signal. */
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("./sw.js").catch(function () { /* fine if it fails (e.g. in preview) */ });
    });
  }
</script>
</body>
